name: Deploy Travel Web
on:
  push:
    branches: ["*"]
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 檢出原始碼
        uses: actions/checkout@v4

      - name: 2. 注入 API 金鑰
        run: |
          echo "替換後："
          grep -o "key=[^&\"]*" *.html | sed 's/key=.\{10\}.*/key=AIza***(已遮蔽)/' || true

      - name: 3. 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
